    <path d="M41 121a62 62 0 0 1 110 0" fill="none" stroke="#07183f" stroke-width="13" stroke-linecap="round"/>
    <path d="M96 105l45-46" stroke="#ef4444" stroke-width="13" stroke-linecap="round"/>
    <circle cx="96" cy="105" r="13" fill="#07183f"/>
    <path d="M16 42h-44M30 12h-32M36 178h-54" stroke="#2563eb" stroke-width="12" stroke-linecap="round"/>
  </g>
  <g transform="translate(414 272)">
    <rect x="0" y="0" width="136" height="84" rx="18" fill="#0b4ac8"/>
    <rect x="24" y="18" width="88" height="48" rx="10" fill="#bfdbfe"/>
    <path d="M-18 18H0M-18 42H0M-18 66H0M136 18h18M136 42h18M136 66h18M30-18v18M68-18v18M106-18v18M30 84v18M68 84v18M106 84v18" stroke="#0b4ac8" stroke-width="8" stroke-linecap="round"/>
