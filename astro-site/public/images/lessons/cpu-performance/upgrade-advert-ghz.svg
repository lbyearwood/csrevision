<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Higher GHz CPU upgrade advert</title>
  <desc id="desc">A poster-style CPU advert promoting clock speed with a large 3.8 GHz label, speedometer and CPU chip.</desc>
  <rect width="640" height="420" rx="34" fill="#eaf2ff"/>
  <rect x="30" y="30" width="580" height="360" rx="30" fill="#ffffff" stroke="#1d4ed8" stroke-width="7"/>
  <path d="M58 65h190" stroke="#facc15" stroke-width="18" stroke-linecap="round"/>
  <path d="M58 98h112" stroke="#facc15" stroke-width="10" stroke-linecap="round"/>
  <text x="60" y="148" fill="#0b4ac8" font-family="Arial, sans-serif" font-size="38" font-weight="700">SPEED BOOST</text>
  <text x="60" y="240" fill="#07183f" font-family="Arial, sans-serif" font-size="92" font-weight="700">3.8</text>
  <text x="245" y="240" fill="#07183f" font-family="Arial, sans-serif" font-size="56" font-weight="700">GHz</text>
  <text x="66" y="294" fill="#334155" font-family="Arial, sans-serif" font-size="26" font-weight="700">faster clock ticks</text>
  <g transform="translate(390 74)">
