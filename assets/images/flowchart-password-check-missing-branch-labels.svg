<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">Password check flowchart with missing branch labels</title>
  <desc id="desc">A password check flowchart where the Yes and No labels are missing from the decision branches.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#102033"/>
    </marker>
  </defs>
  <rect width="900" height="620" fill="#ffffff"/>
  <g fill="none" stroke="#102033" stroke-width="4" stroke-linejoin="round">
    <rect x="340" y="28" width="220" height="70" rx="35"/>
    <polygon points="305,142 595,142 555,212 265,212"/>
    <polygon points="450,258 635,343 450,428 265,343"/>
    <polygon points="86,458 346,458 316,528 56,528"/>
    <polygon points="554,458 824,458 794,528 524,528"/>
    <rect x="340" y="548" width="220" height="58" rx="29"/>
  </g>
  <g stroke="#102033" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <line x1="450" y1="98" x2="450" y2="136"/>
    <line x1="450" y1="212" x2="450" y2="252"/>
    <polyline points="265,343 205,343 205,452"/>
    <polyline points="635,343 670,343 670,452"/>
    <polyline points="205,528 205,576 334,576"/>
    <polyline points="670,528 670,576 566,576"/>
  </g>
  <g fill="#102033" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="450" y="73" font-size="30">Start</text>
    <text x="430" y="185" font-size="28">Input password</text>
    <text x="450" y="336" font-size="24">password = "revision"?</text>
    <text x="205" y="501" font-size="25">Output "Try again"</text>
    <text x="674" y="501" font-size="24">Output "Access granted"</text>
    <text x="450" y="587" font-size="30">End</text>
  </g>
</svg>
