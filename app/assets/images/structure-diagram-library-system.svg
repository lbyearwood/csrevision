<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Library system structure diagram</title>
  <desc id="desc">A structure diagram with Library system at the top and modules for search catalogue, issue book, return book and update member details underneath.</desc>
  <rect width="900" height="520" fill="#ffffff"/>
  <g stroke="#102033" stroke-width="4" fill="#f7fbfd">
    <rect x="315" y="40" width="270" height="76" rx="8"/>
    <rect x="48" y="280" width="180" height="76" rx="8"/>
    <rect x="264" y="280" width="160" height="76" rx="8"/>
    <rect x="464" y="280" width="160" height="76" rx="8"/>
    <rect x="660" y="280" width="190" height="76" rx="8"/>
  </g>
  <g stroke="#102033" stroke-width="4" fill="none">
    <line x1="450" y1="116" x2="450" y2="200"/>
    <line x1="138" y1="200" x2="755" y2="200"/>
    <line x1="138" y1="200" x2="138" y2="280"/>
    <line x1="344" y1="200" x2="344" y2="280"/>
    <line x1="544" y1="200" x2="544" y2="280"/>
    <line x1="755" y1="200" x2="755" y2="280"/>
  </g>
  <g fill="#102033" font-family="Arial, sans-serif" font-size="24" text-anchor="middle">
    <text x="450" y="72">Library</text>
    <text x="450" y="100">system</text>
    <text x="138" y="310">Search</text>
    <text x="138" y="338">catalogue</text>
    <text x="344" y="310">Issue</text>
    <text x="344" y="338">book</text>
    <text x="544" y="310">Return</text>
    <text x="544" y="338">book</text>
    <text x="755" y="310">Update member</text>
    <text x="755" y="338">details</text>
  </g>
</svg>
