<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">Quiz app structure diagram</title>
  <desc id="desc">A structure diagram with Quiz app at the top, modules for display menu, ask questions, calculate score and show result, with ask questions split into get answer and check answer.</desc>
  <rect width="900" height="560" fill="#ffffff"/>
  <g stroke="#102033" stroke-width="4" fill="#f7fbfd">
    <rect x="320" y="36" width="260" height="70" rx="8"/>
    <rect x="64" y="220" width="160" height="70" rx="8"/>
    <rect x="270" y="220" width="160" height="70" rx="8"/>
    <rect x="480" y="220" width="160" height="70" rx="8"/>
    <rect x="690" y="220" width="160" height="70" rx="8"/>
    <rect x="250" y="430" width="150" height="70" rx="8"/>
    <rect x="430" y="430" width="150" height="70" rx="8"/>
  </g>
  <g stroke="#102033" stroke-width="4" fill="none">
    <line x1="450" y1="106" x2="450" y2="160"/>
    <line x1="144" y1="160" x2="770" y2="160"/>
    <line x1="144" y1="160" x2="144" y2="220"/>
    <line x1="350" y1="160" x2="350" y2="220"/>
    <line x1="560" y1="160" x2="560" y2="220"/>
    <line x1="770" y1="160" x2="770" y2="220"/>
    <line x1="350" y1="290" x2="350" y2="365"/>
    <line x1="325" y1="365" x2="505" y2="365"/>
    <line x1="325" y1="365" x2="325" y2="430"/>
    <line x1="505" y1="365" x2="505" y2="430"/>
  </g>
  <g fill="#102033" font-family="Arial, sans-serif" font-size="24" text-anchor="middle">
    <text x="450" y="80">Quiz app</text>
    <text x="144" y="250">Display</text><text x="144" y="278">menu</text>
    <text x="350" y="250">Ask</text><text x="350" y="278">questions</text>
    <text x="560" y="250">Calculate</text><text x="560" y="278">score</text>
    <text x="770" y="250">Show</text><text x="770" y="278">result</text>
    <text x="325" y="460">Get</text><text x="325" y="488">answer</text>
    <text x="505" y="460">Check</text><text x="505" y="488">answer</text>
  </g>
</svg>
