<svg xmlns="http://www.w3.org/2000/svg" width="900" height="780" viewBox="0 0 900 780" role="img" aria-labelledby="title desc">
  <title id="title">Count from one to three flowchart</title>
  <desc id="desc">A flowchart that sets count to 1, repeats while count is less than or equal to 3, outputs count, increments count, loops back to the decision, and ends on the No branch.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#102033"/>
    </marker>
  </defs>
  <rect width="900" height="780" fill="#ffffff"/>
  <g fill="none" stroke="#102033" stroke-width="4" stroke-linejoin="round">
    <rect x="340" y="28" width="220" height="70" rx="35"/>
    <rect x="315" y="138" width="270" height="70"/>
    <polygon points="450,258 610,338 450,418 290,338"/>
    <polygon points="96,458 356,458 326,528 66,528"/>
    <rect x="88" y="578" width="260" height="70"/>
    <rect x="620" y="560" width="220" height="58" rx="29"/>
  </g>
  <g stroke="#102033" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <line x1="450" y1="98" x2="450" y2="132"/>
    <line x1="450" y1="208" x2="450" y2="252"/>
    <polyline points="290,338 210,338 210,452"/>
    <line x1="210" y1="528" x2="210" y2="572"/>
    <polyline points="210,648 210,710 450,710 450,424"/>
    <polyline points="610,338 730,338 730,554"/>
  </g>
  <g fill="#102033" font-family="Arial, sans-serif" font-size="30" text-anchor="middle">
    <text x="450" y="73">Start</text>
    <text x="450" y="182">count = 1</text>
    <text x="450" y="330">count &lt;= 3?</text>
    <text x="210" y="502">Output count</text>
    <text x="218" y="623">count = count + 1</text>
    <text x="730" y="598">End</text>
  </g>
  <g fill="#102033" font-family="Arial, sans-serif" font-size="26" font-weight="700">
    <text x="252" y="316">Yes</text>
    <text x="622" y="316">No</text>
  </g>
</svg>
