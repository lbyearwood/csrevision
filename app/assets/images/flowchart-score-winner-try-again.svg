<svg xmlns="http://www.w3.org/2000/svg" width="900" height="650" viewBox="0 0 900 650" role="img" aria-labelledby="title desc">
  <title id="title">Score winner flowchart</title>
  <desc id="desc">A flowchart that inputs a score, checks whether score is at least 10, outputs Winner on the Yes branch, outputs Try again on the No branch, and then ends.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#102033"/>
    </marker>
  </defs>
  <rect width="900" height="650" fill="#ffffff"/>
  <g fill="none" stroke="#102033" stroke-width="4" stroke-linejoin="round">
    <rect x="340" y="28" width="220" height="70" rx="35"/>
    <polygon points="320,148 610,148 570,218 280,218"/>
    <polygon points="450,268 610,348 450,428 290,348"/>
    <polygon points="96,468 356,468 326,538 66,538"/>
    <polygon points="544,468 804,468 774,538 514,538"/>
    <rect x="340" y="570" width="220" height="58" rx="29"/>
  </g>
  <g stroke="#102033" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <line x1="450" y1="98" x2="450" y2="142"/>
    <line x1="450" y1="218" x2="450" y2="262"/>
    <polyline points="290,348 210,348 210,462"/>
    <polyline points="610,348 660,348 660,462"/>
    <polyline points="210,538 210,599 334,599"/>
    <polyline points="660,538 660,599 566,599"/>
  </g>
  <g fill="#102033" font-family="Arial, sans-serif" font-size="30" text-anchor="middle">
    <text x="450" y="73">Start</text>
    <text x="445" y="191">Input score</text>
    <text x="450" y="340">score &gt;= 10?</text>
    <text x="210" y="512">Output "Try again"</text>
    <text x="660" y="512">Output "Winner"</text>
    <text x="450" y="610">End</text>
  </g>
  <g fill="#102033" font-family="Arial, sans-serif" font-size="26" font-weight="700">
    <text x="252" y="326">No</text>
    <text x="622" y="326">Yes</text>
  </g>
</svg>
